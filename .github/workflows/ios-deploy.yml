name: iOS Deploy to App Store

on:
  push:
    branches:
      - release

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        run: |
          cd ios-app
          npm install

      - name: Add iOS platform
        run: |
          cd ios-app
          npx cap add ios

      - name: Generate app icons and splash screen
        run: |
          cd ios-app
          npx capacitor-assets generate --ios

      - name: Sync Capacitor
        run: |
          cd ios-app
          npx cap sync ios

      - name: Set export compliance in Info.plist
        run: |
          cd ios-app
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist

      - name: Set status bar style in Info.plist
        run: |
          cd ios-app
          /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :UIViewControllerBasedStatusBarAppearance false" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarStyle string UIStatusBarStyleDarkContent" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :UIStatusBarStyle UIStatusBarStyleDarkContent" ios/App/App/Info.plist

      - name: Set camera usage description in Info.plist
        run: |
          cd ios-app
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 予定表の共有グループに参加するためQRコードを読み取ります" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 予定表の共有グループに参加するためQRコードを読み取ります" ios/App/App/Info.plist

      # ⚠️ 2026-07-11 一時無効化: Apple Developerアカウントを個人→法人へ切替登録中で、
      # 法人審査（D-U-N-S番号確認等）完了までApp ID(app.dosuru)のPush Notifications
      # capabilityを有効化できないため。この状態でentitlementsがaps-environmentを
      # リクエストすると、Provisioning Profile側にPush capabilityが無くcodesign段階で
      # ビルド失敗する可能性があるため、審査完了までの間コメントアウトする。
      # 復元方法: 以下2ステップのコメントを解除するだけ（コード自体は変更していない）。
      # 復元の前提条件: Apple法人審査完了 → APNs Auth Key発行 → App IDでPush capability
      # 有効化 → 配布用Provisioning Profile再生成 → GitHub Secrets
      # PROVISION_PROFILE_BASE64 更新（詳細は.claude/next.md参照）
      # - name: Create App.entitlements (Push Notifications capability)
      #   run: |
      #     cd ios-app
      #     ENTITLEMENTS_PATH="ios/App/App/App.entitlements"
      #     if [ ! -f "$ENTITLEMENTS_PATH" ]; then
      #       printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n</dict>\n</plist>\n' > "$ENTITLEMENTS_PATH"
      #     fi
      #     /usr/libexec/PlistBuddy -c "Add :aps-environment string production" "$ENTITLEMENTS_PATH" || \
      #     /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENTITLEMENTS_PATH"
      #     cat "$ENTITLEMENTS_PATH"

      - name: Select Xcode 26
        run: |
          XCODE=$(ls /Applications/ | grep -E '^Xcode_26' | sort -r | head -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/${XCODE}"
            echo "Selected: $XCODE"
          else
            echo "Xcode 26 not found, using default: $(xcode-select -p)"
          fi
          xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios-app

      # 上記と同じ理由（Push capability未使用時のcodesign失敗回避）で一時無効化。
      # CODE_SIGN_ENTITLEMENTSがXcodeプロジェクトに設定されないままビルドされるため、
      # 生成されるアプリはentitlements無し（Push capability要求なし）の状態になる。
      # - name: Wire App.entitlements into Xcode project build settings
      #   run: |
      #     cd ios-app
      #     bundle exec ruby -e '
      #       require "xcodeproj"
      #       project_path = "ios/App/App.xcodeproj"
      #       project = Xcodeproj::Project.open(project_path)
      #       target = project.targets.find { |t| t.name == "App" }
      #       raise "App target not found" unless target
      #       target.build_configurations.each do |config|
      #         config.build_settings["CODE_SIGN_ENTITLEMENTS"] = "App/App.entitlements"
      #       end
      #       project.save
      #       puts "CODE_SIGN_ENTITLEMENTS set for #{target.build_configurations.map(&:name).join(%q{, })}"
      #     '

      - name: Extract release notes from package.json
        id: notes
        run: |
          NOTES=$(node -p "require('./ios-app/package.json').releaseNotes || 'バグ修正とパフォーマンス改善'")
          VER=$(node -p "require('./ios-app/package.json').version")
          echo "release_notes=${NOTES}" >> $GITHUB_OUTPUT
          echo "app_version=${VER}" >> $GITHUB_OUTPUT

      - name: Deploy to App Store
        run: |
          cd ios-app
          bundle exec fastlane deploy
        env:
          ASC_KEY_ID:               ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:            ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY:          ${{ secrets.ASC_PRIVATE_KEY }}
          DIST_CERT_BASE64:         ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD:       ${{ secrets.DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          APPLE_TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER:             ${{ github.run_number }}
          RELEASE_NOTES:            ${{ steps.notes.outputs.release_notes }}
          APP_VERSION:              ${{ steps.notes.outputs.app_version }}
