<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF6EE"/>
      <stop offset="100%" stop-color="#F5E6D4"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A070"/>
      <stop offset="100%" stop-color="#C8804A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Subtle decorative circles (background) -->
  <circle cx="1380" cy="-60" r="260" fill="#C8804A" opacity="0.07"/>
  <circle cx="1420" cy="560" r="200" fill="#C8804A" opacity="0.05"/>
  <circle cx="-80" cy="500" r="220" fill="#C8804A" opacity="0.05"/>

  <!-- thin horizontal rule -->
  <line x1="0" y1="499" x2="1500" y2="499" stroke="#E0C8B0" stroke-width="1"/>

  <!-- Text block (centered) -->
  <!-- App name -->
  <text x="750" y="208"
    text-anchor="middle"
    font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
    font-size="80" font-weight="700"
    letter-spacing="-1"
    fill="#2D1A0E">おでかけNavi</text>

  <!-- Tagline -->
  <text x="750" y="278"
    text-anchor="middle"
    font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
    font-size="26" font-weight="400"
    fill="#A07050"
    letter-spacing="3">シンガポール在住者の 週末おでかけガイド</text>

  <!-- Thin accent line -->
  <rect x="490" y="306" width="520" height="2" rx="1" fill="#C8804A" opacity="0.35"/>

  <!-- Sub copy -->
  <text x="750" y="358"
    text-anchor="middle"
    font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
    font-size="24" font-weight="300"
    fill="#8A6040"
    letter-spacing="4">今週末、どこ行く？</text>
</svg>
