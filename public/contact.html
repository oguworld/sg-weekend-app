<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — おでかけNavi</title>
  <link rel="icon" href="/icons/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/css/about-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Kaisei+Opti:wght@700&display=swap" rel="stylesheet">
  <style>
    main { max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
    .subtitle { font-size: 15px; color: var(--warm-gray); margin-bottom: 36px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--sand);
      border-radius: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      color: var(--midnight);
      background: #fff;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    textarea:focus { border-color: var(--caramel); }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--caramel);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--caramel-dark); }
    .btn-submit:disabled { background: var(--sand); color: var(--warm-gray); cursor: not-allowed; }
    .msg { display: none; margin-top: 20px; padding: 16px 20px; border-radius: 14px; font-size: 15px; }
    .msg.success { background: #EAF7F0; color: #2A6B4A; display: block; }
    .msg.error { background: #FDECEA; color: #8B2E2E; display: block; }
    .note { font-size: 13px; color: var(--warm-gray); margin-top: 16px; }
    footer { text-align: center; padding: 32px 24px; font-size: 13px; color: var(--warm-gray); border-top: 1px solid var(--sand); }
    footer p { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 12px; font-size: 13px; color: var(--warm-gray); }
    footer a { color: var(--warm-gray); text-decoration: underline; white-space: nowrap; }
  </style>
</head>
<body>
  <nav>
    <a href="https://about.dosuru.app" class="nav-logo">
      <img src="/icons/icon-128.png" alt="おでかけNavi">
      <span>おでかけNavi</span>
    </a>
    <a href="https://about.dosuru.app" class="nav-back">← トップへ</a>
  </nav>

  <main>
    <h1>お問い合わせ</h1>
    <p class="subtitle">ご質問・ご要望・バグ報告などお気軽にどうぞ。</p>

    <form id="contact-form">
      <div class="form-group">
        <label for="message">メッセージ <span style="color:var(--caramel)">*</span></label>
        <textarea id="message" placeholder="お問い合わせ内容をご記入ください。&#10;&#10;返信をご希望の場合は、メールアドレスをメッセージ内にご記載ください。" required></textarea>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">送信する</button>
      <div class="msg" id="msg-success">✅ メッセージを受け付けました。ありがとうございます。</div>
      <div class="msg" id="msg-error">⚠️ 送信に失敗しました。時間をおいて再度お試しください。</div>
      <p class="note">※ 返信が必要な場合はメッセージ内にメールアドレスをご記入ください。</p>
    </form>
  </main>

  <footer>
    <p>© 2026 WILLOA PTE. LTD. / おでかけNavi
      <a href="https://about.dosuru.app">トップ</a>
      <a href="https://about.dosuru.app/privacy">プライバシーポリシー</a>
      <a href="https://about.dosuru.app/contact">お問い合わせ</a>
    </p>
  </footer>

  <script>
    document.getElementById('contact-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const message = document.getElementById('message').value.trim();
      if (!message) return;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中...';
      document.getElementById('msg-success').style.display = 'none';
      document.getElementById('msg-error').style.display = 'none';
      try {
        const res = await fetch('https://dosuru.app/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: '[about.dosuru.app お問い合わせ]\n\n' + message }),
        });
        if (res.ok) {
          document.getElementById('msg-success').style.display = 'block';
          document.getElementById('message').value = '';
          btn.textContent = '送信しました';
        } else {
          throw new Error('server error');
        }
      } catch {
        document.getElementById('msg-error').style.display = 'block';
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>
</body>
</html>
